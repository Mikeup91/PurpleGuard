<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PurpleGuard Protocol | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { background-color: #020617; color: #e2e8f0; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .scan-line {
        position: absolute; top: 0; left: 0; right: 0; height: 2px;
        background: rgba(239, 68, 68, 0.2); animation: scan 4s linear infinite;
        pointer-events: none;
      }
      @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
  </head>
  <body>
    <div class="scan-line"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
